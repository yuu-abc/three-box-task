<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" role="img" aria-labelledby="title desc">
  <title id="title">THREEBOX app icon</title>
  <desc id="desc">Three dark task slots on a tilted lime card</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="12" x2="170" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17171D"/>
      <stop offset="1" stop-color="#08080A"/>
    </linearGradient>
    <linearGradient id="card" x1="50" y1="43" x2="140" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7FF72"/>
      <stop offset="1" stop-color="#B8F72D"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="160" height="160" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="192" height="192" rx="44" fill="url(#bg)"/>
  <circle cx="151" cy="39" r="31" fill="#9F8CFF" opacity="0.12"/>
  <g filter="url(#shadow)" transform="rotate(-6 96 96)">
    <rect x="55" y="45" width="98" height="106" rx="27" fill="#9F8CFF"/>
    <rect x="39" y="37" width="108" height="112" rx="29" fill="url(#card)"/>
    <rect x="59" y="62" width="68" height="17" rx="8.5" fill="#0A0A0C"/>
    <rect x="59" y="86" width="68" height="17" rx="8.5" fill="#0A0A0C"/>
    <rect x="59" y="110" width="68" height="17" rx="8.5" fill="#0A0A0C"/>
    <circle cx="68" cy="70.5" r="3" fill="#C7FF45"/>
    <circle cx="68" cy="94.5" r="3" fill="#9F8CFF"/>
    <circle cx="68" cy="118.5" r="3" fill="#74C8FF"/>
  </g>
</svg>
