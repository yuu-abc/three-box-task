<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="今日・今週・いつか。やることを3つの箱で軽やかに整理する、オフライン対応タスクアプリ。">
  <meta name="theme-color" content="#0A0A0C">
  <meta name="color-scheme" content="dark">
  <meta name="application-name" content="3箱タスク">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>THREEBOX — 3箱タスク</title>
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #0a0a0c;
      --panel: #121216;
      --panel-raised: #18181d;
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.16);
      --text: #f5f5f2;
      --muted: #8c8c96;
      --lime: #c7ff45;
      --violet: #9f8cff;
      --blue: #74c8ff;
      --danger: #ff6b78;
      --today-progress: 0%;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html { background: var(--bg); }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      padding: max(18px, env(safe-area-inset-top)) 0 calc(154px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 10% -10%, rgba(159, 140, 255, 0.17), transparent 30rem),
        radial-gradient(circle at 100% 26%, rgba(199, 255, 69, 0.08), transparent 24rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, "SF Pro Display", "Hiragino Sans", "Yu Gothic UI", system-ui, -apple-system, sans-serif;
      letter-spacing: 0.01em;
    }

    button,
    input,
    select { font: inherit; }

    button,
    select { touch-action: manipulation; }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--lime);
      outline-offset: 2px;
    }

    .app-shell {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .page-pad { padding-inline: 20px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      flex: 0 0 38px;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 12px;
      background: var(--lime);
      color: #09090b;
      font-size: 21px;
      font-weight: 950;
      box-shadow: 0 0 30px rgba(199, 255, 69, 0.12);
      transform: rotate(-4deg);
    }

    .brand-copy { min-width: 0; }

    .brand-name {
      font-size: 15px;
      font-weight: 850;
      letter-spacing: 0.12em;
      line-height: 1.1;
    }

    .brand-tagline {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
      letter-spacing: 0.08em;
    }

    .reset-btn {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 750;
      letter-spacing: 0.08em;
      transition: border-color 180ms ease, color 180ms ease, background 180ms ease;
    }

    .reset-btn:active {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .overview {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      min-height: 176px;
      overflow: hidden;
      margin-bottom: 22px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.065), transparent 46%),
        rgba(18, 18, 22, 0.86);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
    }

    .overview::after {
      content: "";
      position: absolute;
      right: -70px;
      bottom: -100px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(199, 255, 69, 0.08);
      filter: blur(2px);
    }

    .eyebrow {
      margin-bottom: 10px;
      color: var(--lime);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.18em;
    }

    .overview h1 {
      max-width: 330px;
      font-size: clamp(26px, 7vw, 38px);
      font-weight: 850;
      letter-spacing: -0.055em;
      line-height: 1.08;
    }

    .overview h1 span { color: var(--lime); }

    .date-line {
      margin-top: 15px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 620;
    }

    .progress-ring {
      position: relative;
      z-index: 1;
      display: grid;
      align-self: center;
      width: 86px;
      height: 86px;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(var(--lime) var(--today-progress), rgba(255, 255, 255, 0.08) 0);
      box-shadow: 0 0 40px rgba(199, 255, 69, 0.08);
    }

    .progress-ring::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: inherit;
      background: #111115;
    }

    .progress-value {
      position: relative;
      color: var(--text);
      font-size: 19px;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 17px;
    }

    .section-label {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 13px;
      font-weight: 820;
      letter-spacing: 0.07em;
    }

    .section-label small {
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
      letter-spacing: 0.08em;
    }

    .offline-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.025);
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .offline-status::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 10px rgba(199, 255, 69, 0.75);
    }

    .offline-status.offline::before {
      background: var(--danger);
      box-shadow: 0 0 10px rgba(255, 107, 120, 0.6);
    }

    .board {
      display: grid;
      grid-auto-columns: min(88vw, 350px);
      grid-auto-flow: column;
      gap: 13px;
      overflow-x: auto;
      padding: 0 20px 16px;
      scroll-padding-inline: 20px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      overscroll-behavior-inline: contain;
    }

    .board::-webkit-scrollbar { display: none; }

    .bucket {
      --accent: var(--lime);
      position: relative;
      display: flex;
      min-height: 305px;
      flex-direction: column;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(18, 18, 22, 0.91);
      scroll-snap-align: start;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .bucket[data-bucket="week"] { --accent: var(--violet); }
    .bucket[data-bucket="someday"] { --accent: var(--blue); }

    .bucket.drag-over {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 7%, var(--panel));
      transform: translateY(-3px);
    }

    .bucket-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 17px;
    }

    .bucket-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bucket-number {
      color: var(--accent);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.08em;
    }

    .bucket-title {
      font-size: 19px;
      font-weight: 820;
      letter-spacing: -0.025em;
    }

    .bucket-count {
      display: grid;
      min-width: 30px;
      height: 30px;
      padding: 0 8px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      font-size: 11px;
      font-weight: 800;
    }

    .task-list {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 9px;
    }

    .empty-state {
      display: grid;
      min-height: 190px;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: 17px;
      color: #666671;
      font-size: 12px;
      font-weight: 650;
      line-height: 1.8;
      text-align: center;
    }

    .empty-state::before {
      content: "+";
      display: grid;
      width: 36px;
      height: 36px;
      margin: 0 auto 8px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--accent);
      font-size: 20px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 10px 8px 10px 11px;
      border: 1px solid transparent;
      border-radius: 16px;
      background: var(--panel-raised);
      cursor: grab;
      touch-action: manipulation;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      user-select: none;
    }

    .task-item:active { cursor: grabbing; }

    .task-item:hover { border-color: var(--line); }

    .task-item.dragging {
      opacity: 0.45;
      transform: scale(0.98);
    }

    .task-item.pointer-dragging {
      position: fixed;
      z-index: 1500;
      width: var(--drag-width);
      pointer-events: none;
      opacity: 0.96;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
    }

    .task-item.done { opacity: 0.48; }

    .task-checkbox {
      display: grid;
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      padding: 0;
      place-items: center;
      border: 1.5px solid #52525e;
      border-radius: 9px;
      background: transparent;
      color: #09090b;
      cursor: pointer;
      font-size: 15px;
      font-weight: 900;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .task-checkbox:active { transform: scale(0.88); }

    .task-checkbox.done {
      border-color: var(--accent);
      background: var(--accent);
    }

    .task-label {
      min-width: 0;
      flex: 1;
      color: #e8e8e4;
      font-size: 14px;
      font-weight: 580;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .task-label.done {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    .task-move {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      padding: 0 6px;
      border: 0;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      cursor: pointer;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
    }

    .task-delete {
      display: grid;
      flex: 0 0 36px;
      width: 36px;
      height: 36px;
      padding: 0;
      place-items: center;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: #686873;
      cursor: pointer;
      font-size: 14px;
    }

    .task-delete:active {
      background: rgba(255, 107, 120, 0.1);
      color: var(--danger);
    }

    .swipe-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 3px;
      color: #5f5f69;
      font-size: 9px;
      font-weight: 750;
      letter-spacing: 0.08em;
    }

    .swipe-hint::before,
    .swipe-hint::after {
      content: "";
      width: 18px;
      height: 1px;
      background: var(--line);
    }

    .composer-shell {
      position: fixed;
      z-index: 1000;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(10, 10, 12, 1) 64%, rgba(10, 10, 12, 0));
    }

    .composer {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 22px;
      background: rgba(24, 24, 29, 0.96);
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(18px);
    }

    .bucket-select {
      width: 76px;
      min-height: 48px;
      padding: 0 10px;
      border: 0;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
    }

    .task-input {
      min-width: 0;
      min-height: 48px;
      padding: 0 5px;
      border: 0;
      border-radius: 12px;
      outline: 0;
      background: transparent;
      color: var(--text);
      caret-color: var(--lime);
      font-size: 16px;
      font-weight: 580;
    }

    .task-input::placeholder { color: #6f6f79; }

    .task-input.error {
      background: rgba(255, 107, 120, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 107, 120, 0.45);
    }

    .add-btn {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border: 0;
      border-radius: 15px;
      background: var(--lime);
      color: #0a0a0c;
      cursor: pointer;
      font-size: 27px;
      font-weight: 450;
      line-height: 1;
      box-shadow: 0 9px 24px rgba(199, 255, 69, 0.16);
      transition: transform 150ms ease, filter 150ms ease;
    }

    .add-btn:active {
      filter: brightness(0.88);
      transform: scale(0.92);
    }

    .warning-msg,
    .toast-msg {
      position: fixed;
      z-index: 1800;
      bottom: calc(94px + env(safe-area-inset-bottom));
      left: 50%;
      width: max-content;
      max-width: calc(100% - 40px);
      padding: 12px 17px;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: #24242b;
      color: var(--text);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.4);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      animation: toastIn 250ms ease both;
    }

    .warning-msg {
      border-color: rgba(255, 107, 120, 0.38);
      background: #2b1b20;
      color: #ffb4bc;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 12px) scale(0.96); }
      to { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    .modal-overlay {
      position: fixed;
      z-index: 2000;
      inset: 0;
      display: grid;
      padding: 20px;
      place-items: center;
      background: rgba(0, 0, 0, 0.74);
      backdrop-filter: blur(8px);
      animation: fadeIn 160ms ease both;
    }

    @keyframes fadeIn { from { opacity: 0; } }

    .modal-box {
      width: min(100%, 340px);
      padding: 22px;
      border: 1px solid var(--line-strong);
      border-radius: 24px;
      background: #17171c;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
    }

    .modal-kicker {
      margin-bottom: 8px;
      color: var(--danger);
      font-size: 9px;
      font-weight: 850;
      letter-spacing: 0.15em;
    }

    .modal-msg {
      margin-bottom: 22px;
      color: var(--text);
      font-size: 15px;
      font-weight: 650;
      line-height: 1.65;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .modal-btn {
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
    }

    .modal-btn.danger {
      border-color: transparent;
      background: var(--danger);
      color: #1a090c;
    }

    @media (min-width: 760px) {
      body { padding-top: 34px; }

      .page-pad { padding-inline: 22px; }

      .board {
        grid-auto-columns: unset;
        grid-auto-flow: initial;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        overflow: visible;
        padding-inline: 22px;
      }

      .bucket { min-height: 360px; }

      .swipe-hint { display: none; }
    }

    @media (max-width: 380px) {
      .overview { padding: 20px; }
      .overview h1 { font-size: 25px; }
      .progress-ring { width: 74px; height: 74px; }
      .bucket-select { width: 68px; padding-inline: 7px; }
      .composer { gap: 5px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div class="page-pad">
      <header class="header">
        <div class="brand" aria-label="THREEBOX 3箱タスク">
          <span class="brand-mark" aria-hidden="true">3</span>
          <div class="brand-copy">
            <p class="brand-name">THREEBOX</p>
            <p class="brand-tagline">DO LESS. FINISH MORE.</p>
          </div>
        </div>
        <button class="reset-btn" id="clear-btn" type="button">RESET</button>
      </header>

      <section class="overview" aria-labelledby="overview-title">
        <div>
          <p class="eyebrow">TODAY'S FOCUS</p>
          <h1 id="overview-title">今日を、<span id="focus-copy">軽くする。</span></h1>
          <p class="date-line" id="jst-date" aria-live="polite"></p>
        </div>
        <div class="progress-ring" role="img" aria-label="今日の進捗 0%" id="progress-ring">
          <span class="progress-value" id="progress-value">0%</span>
        </div>
      </section>

      <div class="meta-row">
        <p class="section-label">YOUR BOXES <small>横にスワイプ</small></p>
        <p class="offline-status" id="offline-status" aria-live="polite">LOCAL SAVE</p>
      </div>
    </div>

    <section class="board" id="board" aria-label="タスクの3つの箱"></section>
    <p class="swipe-hint">SWIPE TO SWITCH</p>
  </main>

  <div class="composer-shell">
    <form class="composer" id="task-form" autocomplete="off">
      <select class="bucket-select" id="new-bucket" aria-label="追加する箱">
        <option value="today">今日</option>
        <option value="week">今週</option>
        <option value="someday">いつか</option>
      </select>
      <input class="task-input" type="text" id="new-task" maxlength="120" placeholder="新しいタスク…" inputmode="text" enterkeyhint="done" aria-label="新しいタスク">
      <button class="add-btn" type="submit" aria-label="タスクを追加">＋</button>
    </form>
  </div>

  <script>
    const STORAGE_KEY = 'task_manager_data';
    const buckets = [
      { key: 'today', label: '今日', number: '01', selectIcon: '01', limit: null },
      { key: 'week', label: '今週', number: '02', selectIcon: '02', limit: null },
      { key: 'someday', label: 'いつか', number: '03', selectIcon: '03', limit: null }
    ];
    const bucketByKey = Object.fromEntries(buckets.map(bucket => [bucket.key, bucket]));

    let tasks = [];
    let idCounter = 1;

    function updateOfflineStatus() {
      const statusEl = document.getElementById('offline-status');
      if (!statusEl) return;
      statusEl.textContent = navigator.onLine ? 'LOCAL SAVE' : 'OFFLINE';
      statusEl.classList.toggle('offline', !navigator.onLine);
    }

    function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) {
        updateOfflineStatus();
        return;
      }

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(updateOfflineStatus)
          .catch((error) => {
            console.error('Service Worker登録エラー:', error);
            const statusEl = document.getElementById('offline-status');
            if (statusEl) {
              statusEl.textContent = 'SAVE ERROR';
              statusEl.classList.add('offline');
            }
          });
      });
    }

    function updateJstDate() {
      const dateEl = document.getElementById('jst-date');
      if (!dateEl) return;
      dateEl.textContent = new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        month: 'long',
        day: 'numeric',
        weekday: 'short'
      }).format(new Date());
    }

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) return;

      try {
        const data = JSON.parse(stored);
        tasks = Array.isArray(data.tasks) ? data.tasks : [];
        idCounter = Number.isFinite(data.idCounter) ? data.idCounter : 1;
      } catch (error) {
        console.error('データ読み込みエラー:', error);
        tasks = [];
      }
    }

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, idCounter }));
      } catch (error) {
        console.error('保存エラー:', error);
        showWarning('保存に失敗しました');
      }
    }

    function renderOverview() {
      const todayTasks = tasks.filter(task => task.bucket === 'today');
      const completed = todayTasks.filter(task => task.done).length;
      const progress = todayTasks.length ? Math.round((completed / todayTasks.length) * 100) : 0;
      const open = todayTasks.length - completed;
      const progressValue = document.getElementById('progress-value');
      const progressRing = document.getElementById('progress-ring');
      const focusCopy = document.getElementById('focus-copy');

      document.documentElement.style.setProperty('--today-progress', `${progress}%`);
      progressValue.textContent = `${progress}%`;
      progressRing.setAttribute('aria-label', `今日の進捗 ${progress}%`);

      if (todayTasks.length === 0) {
        focusCopy.textContent = '軽くする。';
      } else if (open === 0) {
        focusCopy.textContent = 'やり切った。';
      } else {
        focusCopy.textContent = `あと${open}つ。`;
      }
    }

    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      buckets.forEach(bucket => {
        const items = tasks
          .filter(task => task.bucket === bucket.key)
          .slice()
          .sort((first, second) => (first.done === second.done ? 0 : first.done ? 1 : -1));

        const column = document.createElement('article');
        column.className = 'bucket';
        column.dataset.bucket = bucket.key;
        column.addEventListener('dragover', handleBucketDragOver);
        column.addEventListener('dragleave', handleBucketDragLeave);
        column.addEventListener('drop', handleBucketDrop);

        const header = document.createElement('header');
        header.className = 'bucket-header';

        const titleWrap = document.createElement('div');
        titleWrap.className = 'bucket-title-wrap';

        const number = document.createElement('span');
        number.className = 'bucket-number';
        number.textContent = bucket.number;

        const title = document.createElement('h2');
        title.className = 'bucket-title';
        title.textContent = bucket.label;

        const count = document.createElement('span');
        count.className = 'bucket-count';
        count.textContent = items.filter(task => !task.done).length;
        count.setAttribute('aria-label', `未完了 ${count.textContent}件`);

        titleWrap.append(number, title);
        header.append(titleWrap, count);
        column.appendChild(header);

        const list = document.createElement('div');
        list.className = 'task-list';

        if (items.length === 0) {
          const empty = document.createElement('p');
          empty.className = 'empty-state';
          empty.innerHTML = 'タスクはまだ空です<br>下の入力欄から追加';
          list.appendChild(empty);
        }

        items.forEach(task => list.appendChild(createTaskItem(task)));
        column.appendChild(list);
        board.appendChild(column);
      });

      renderOverview();
    }

    function createTaskItem(task) {
      const row = document.createElement('div');
      row.className = `task-item ${task.done ? 'done' : ''}`;
      row.draggable = true;
      row.dataset.taskId = String(task.id);
      row.setAttribute('aria-label', `${task.text}。ドラッグして箱を移動できます`);
      row.addEventListener('dragstart', handleTaskDragStart);
      row.addEventListener('dragend', handleTaskDragEnd);
      row.addEventListener('pointerdown', handleTaskPointerDown);

      const check = document.createElement('button');
      check.type = 'button';
      check.className = `task-checkbox ${task.done ? 'done' : ''}`;
      check.setAttribute('aria-label', task.done ? '未完了に戻す' : '完了にする');
      check.textContent = task.done ? '✓' : '';
      check.addEventListener('click', event => {
        event.preventDefault();
        task.done = !task.done;
        saveData();
        render();
      });

      const label = document.createElement('span');
      label.className = `task-label ${task.done ? 'done' : ''}`;
      label.textContent = task.text;

      const move = document.createElement('select');
      move.className = 'task-move';
      move.setAttribute('aria-label', '箱を移動');
      buckets.forEach(optionBucket => {
        const option = document.createElement('option');
        option.value = optionBucket.key;
        option.textContent = optionBucket.selectIcon;
        option.selected = optionBucket.key === task.bucket;
        move.appendChild(option);
      });
      move.addEventListener('change', () => {
        if (move.value !== task.bucket) moveTaskToBucket(task.id, move.value);
      });

      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'task-delete';
      remove.setAttribute('aria-label', '削除');
      remove.textContent = '×';
      remove.addEventListener('click', event => {
        event.preventDefault();
        showConfirm('このタスクを削除しますか？', () => {
          tasks = tasks.filter(item => item.id !== task.id);
          saveData();
          render();
        });
      });

      row.append(check, label, move, remove);
      return row;
    }

    function getTaskById(taskId) {
      return tasks.find(task => String(task.id) === String(taskId));
    }

    function moveTaskToBucket(taskId, bucketKey) {
      const task = getTaskById(taskId);
      if (!task || task.bucket === bucketKey || !bucketByKey[bucketKey]) return false;
      task.bucket = bucketKey;
      saveData();
      render();
      showToast(`${bucketByKey[bucketKey].label}へ移動しました`);
      return true;
    }

    function clearDragOver() {
      document.querySelectorAll('.bucket.drag-over').forEach(bucket => bucket.classList.remove('drag-over'));
    }

    function handleTaskDragStart(event) {
      if (event.target.closest('button, select')) {
        event.preventDefault();
        return;
      }
      event.currentTarget.classList.add('dragging');
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', event.currentTarget.dataset.taskId);
    }

    function handleTaskDragEnd(event) {
      event.currentTarget.classList.remove('dragging');
      clearDragOver();
    }

    function handleBucketDragOver(event) {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      clearDragOver();
      event.currentTarget.classList.add('drag-over');
    }

    function handleBucketDragLeave(event) {
      if (!event.currentTarget.contains(event.relatedTarget)) {
        event.currentTarget.classList.remove('drag-over');
      }
    }

    function handleBucketDrop(event) {
      event.preventDefault();
      const taskId = event.dataTransfer.getData('text/plain');
      const bucketKey = event.currentTarget.dataset.bucket;
      clearDragOver();
      moveTaskToBucket(taskId, bucketKey);
    }

    function handleTaskPointerDown(event) {
      if (event.pointerType === 'mouse' || event.target.closest('button, select')) return;

      const row = event.currentTarget;
      const taskId = row.dataset.taskId;
      const rect = row.getBoundingClientRect();
      const startX = event.clientX;
      const startY = event.clientY;
      let isDragging = false;

      const moveDraggedRow = (clientX, clientY) => {
        row.style.left = `${clientX - rect.width / 2}px`;
        row.style.top = `${clientY - rect.height / 2}px`;
      };

      const onPointerMove = moveEvent => {
        const delta = Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY);
        if (!isDragging && delta < 8) return;
        if (!isDragging) {
          isDragging = true;
          row.setPointerCapture(event.pointerId);
          row.style.setProperty('--drag-width', `${rect.width}px`);
          row.classList.add('pointer-dragging');
        }
        moveEvent.preventDefault();
        moveDraggedRow(moveEvent.clientX, moveEvent.clientY);
        clearDragOver();
        const targetBucket = document.elementFromPoint(moveEvent.clientX, moveEvent.clientY)?.closest('.bucket');
        if (targetBucket) targetBucket.classList.add('drag-over');
      };

      const onPointerUp = upEvent => {
        row.removeEventListener('pointermove', onPointerMove);
        row.removeEventListener('pointerup', onPointerUp);
        row.removeEventListener('pointercancel', onPointerUp);
        row.classList.remove('pointer-dragging');
        row.style.left = '';
        row.style.top = '';
        row.style.removeProperty('--drag-width');
        const targetBucket = document.elementFromPoint(upEvent.clientX, upEvent.clientY)?.closest('.bucket');
        clearDragOver();
        if (isDragging && targetBucket) moveTaskToBucket(taskId, targetBucket.dataset.bucket);
      };

      row.addEventListener('pointermove', onPointerMove);
      row.addEventListener('pointerup', onPointerUp);
      row.addEventListener('pointercancel', onPointerUp);
    }

    function showMessage(message, className, duration) {
      document.querySelectorAll('.warning-msg, .toast-msg').forEach(element => element.remove());
      const element = document.createElement('div');
      element.className = className;
      element.setAttribute('role', 'status');
      element.textContent = message;
      document.body.appendChild(element);
      setTimeout(() => element.remove(), duration);
    }

    function showWarning(message) {
      showMessage(message, 'warning-msg', 3000);
    }

    function showToast(message) {
      showMessage(message, 'toast-msg', 2200);
    }

    function showConfirm(message, onConfirm) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.setAttribute('role', 'dialog');
      overlay.setAttribute('aria-modal', 'true');
      overlay.setAttribute('aria-labelledby', 'confirm-message');

      const box = document.createElement('div');
      box.className = 'modal-box';

      const kicker = document.createElement('p');
      kicker.className = 'modal-kicker';
      kicker.textContent = 'CONFIRM';

      const messageElement = document.createElement('p');
      messageElement.className = 'modal-msg';
      messageElement.id = 'confirm-message';
      messageElement.textContent = message;

      const actions = document.createElement('div');
      actions.className = 'modal-actions';

      const cancelButton = document.createElement('button');
      cancelButton.type = 'button';
      cancelButton.className = 'modal-btn';
      cancelButton.textContent = 'キャンセル';
      cancelButton.addEventListener('click', () => overlay.remove());

      const confirmButton = document.createElement('button');
      confirmButton.type = 'button';
      confirmButton.className = 'modal-btn danger';
      confirmButton.textContent = '削除する';
      confirmButton.addEventListener('click', () => {
        overlay.remove();
        onConfirm();
      });

      const closeModal = event => {
        if (event.key === 'Escape') {
          overlay.remove();
          document.removeEventListener('keydown', closeModal);
        }
      };

      actions.append(cancelButton, confirmButton);
      box.append(kicker, messageElement, actions);
      overlay.appendChild(box);
      overlay.addEventListener('click', event => {
        if (event.target === overlay) overlay.remove();
      });
      document.addEventListener('keydown', closeModal);
      document.body.appendChild(overlay);
      cancelButton.focus();
    }

    function addTask() {
      const input = document.getElementById('new-task');
      const bucketSelect = document.getElementById('new-bucket');
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }

      const bucketKey = bucketSelect.value;
      const limit = bucketByKey[bucketKey].limit;
      const currentCount = tasks.filter(task => task.bucket === bucketKey && !task.done).length;

      if (limit && currentCount >= limit) {
        input.classList.add('error');
        showWarning('上限に達しました。完了するか移動してください');
        setTimeout(() => input.classList.remove('error'), 2000);
        return;
      }

      tasks.push({ id: idCounter++, text, bucket: bucketKey, done: false });
      input.value = '';
      saveData();
      render();
      input.blur();
    }

    document.getElementById('task-form').addEventListener('submit', event => {
      event.preventDefault();
      addTask();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (!tasks.length) {
        showToast('削除するタスクはありません');
        return;
      }
      showConfirm('すべてのタスクを削除しますか？', () => {
        tasks = [];
        idCounter = 1;
        saveData();
        render();
      });
    });

    registerServiceWorker();
    window.addEventListener('online', updateOfflineStatus);
    window.addEventListener('offline', updateOfflineStatus);
    loadData();
    updateJstDate();
    updateOfflineStatus();
    setInterval(updateJstDate, 60 * 1000);
    render();
  </script>
</body>
</html>
